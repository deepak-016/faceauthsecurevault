<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enroll Face – FaceAuth</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); }
    .enroll-card { background:var(--surface-1); border:1px solid var(--border); border-radius:20px; padding:40px; max-width:480px; width:100%; text-align:center; }
    .enroll-card h2 { font-size:24px; margin-bottom:8px; }
    .enroll-card p  { color:var(--text-secondary); margin-bottom:24px; }
    video { width:100%; border-radius:12px; margin-bottom:16px; background:#000; display:none; }
    .status { padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px; display:none; }
    .status.success { background:#10b98120; color:#10b981; display:block; }
    .status.error   { background:#ef444420; color:#ef4444; display:block; }
    .status.info    { background:#3b82f620; color:#3b82f6; display:block; }
    input { width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-primary); font-size:15px; margin-bottom:16px; box-sizing:border-box; }
    button { width:100%; padding:14px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:10px; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    button.secondary { background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); }
    canvas { display:none; }
  </style>
</head>
<body>
<div class="enroll-card">
  <h2>📷 Enroll Your Face</h2>
  <p>Enter your <strong>Username</strong> (the one you registered with), then capture your face.</p>

  <input type="text" id="nameInput" placeholder="Enter your Username (e.g. john_doe)" />

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div class="status" id="status"></div>

  <button id="startBtn" onclick="startCamera()">Start Camera</button>
  <button id="captureBtn" onclick="capture()" disabled>📸 Capture &amp; Enroll Face</button>
  <button class="secondary" onclick="window.location.href='face-login.html'">Go to Face Login →</button>
</div>

<script>
const API = 'http://localhost:8086';
let stream = null;

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + type;
}

async function startCamera() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    showStatus('Please enter your username first.', 'error');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('startBtn').disabled = true;
    document.getElementById('captureBtn').disabled = false;
    showStatus('Camera ready! Look at the camera and click Capture.', 'info');
  } catch(err) {
    showStatus('Camera error: ' + err.message + ' — Please allow camera access.', 'error');
  }
}

async function capture() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showStatus('Please enter your name.', 'error'); return; }

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];

  document.getElementById('captureBtn').disabled = true;
  document.getElementById('captureBtn').textContent = 'Enrolling...';
  showStatus('Sending face to server...', 'info');

  try {
    const res = await fetch(API + '/api/auth/face/enroll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: name, imageBase64: base64 })
    });
    const data = await res.json();

    if (res.ok) {
      showStatus('✅ Face enrolled successfully! You can now use Face Login.', 'success');
      if (stream) stream.getTracks().forEach(t => t.stop());
      document.getElementById('video').style.display = 'none';
      document.getElementById('captureBtn').textContent = '✅ Enrolled!';
    } else {
      showStatus('❌ ' + (data.message || 'Enrollment failed. Try again.'), 'error');
      document.getElementById('captureBtn').disabled = false;
      document.getElementById('captureBtn').textContent = '📸 Capture & Enroll Face';
    }
  } catch(err) {
    showStatus('❌ Cannot connect to server. Is Spring Boot running?', 'error');
    document.getElementById('captureBtn').disabled = false;
    document.getElementById('captureBtn').textContent = '📸 Capture & Enroll Face';
  }
}
</script>
</body>
</html>
