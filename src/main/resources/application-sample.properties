spring.application.name=faceauth
spring.datasource.url=jdbc:mysql://localhost:3306/faceauth
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8086

# Without these, Spring Boot defaults to max-file-size=1MB and
# max-request-size=10MB, silently rejecting anything bigger even
# though the UI advertises a 50 MB limit.
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Tomcat's own connector-level limit (default ~2MB) can reject large
# multipart bodies before Spring even sees them, which shows up in the
# browser as a raw connection failure rather than a clean HTTP error.
server.tomcat.max-http-form-post-size=52428800
server.tomcat.max-swallow-size=52428800

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Without these, JavaMail's default socket timeout is effectively infinite,
# so a slow/unreachable SMTP server can hang a request forever.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
